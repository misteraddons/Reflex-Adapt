[platformio]
default_envs = classic2usb
src_dir = .
lib_dir = third_party

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#79ce473e1a8010ed8096388690222fd2c94858a6
framework = arduino
board = rpipico
board_build.core = earlephilhower
# Keep RP2040 builds on a 12 MHz CPU-clock multiple for TinyUSB timing.
board_build.f_cpu = 240000000L
board_build.filesystem_size = 4k
board_build.arduino.earlephilhower.boot2_source = boot2_w25q080_2_padded_checksum.S
# The last 4KB remains Arduino-Pico EEPROM. The 4KB filesystem slot immediately
# before it is intentionally reserved for Adapt-managed records that are too
# large for the EEPROM emulation cap.
board_upload.maximum_size = 2093056
upload_protocol = picotool
extra_scripts = pre:tools/pio_hooks.py
build_src_filter =
  -<*>
  +<firmware/>
  +<third_party/firmware_libraries/>
  -<_worktrees/>
  -<third_party/Adafruit_TinyUSB_Arduino/>
  -<third_party/licenses/>
build_flags =
  -DUSE_TINYUSB
  -DLWIP_IPV6=0
  -DLWIP_IPV4=1
  -Ithird_party/firmware_libraries
  -Ithird_party/firmware_libraries/SSD1306Ascii
  -Ithird_party/firmware_libraries/U8g2/src
  -Ithird_party/firmware_libraries/libxsm3
lib_ignore =
  firmware_libraries
  licenses

[env:classic2usb]
build_src_filter =
  ${env.build_src_filter}
  -<third_party/firmware_libraries/JoybusLib/joybus_gba.cpp>
lib_ignore =
  ${env.lib_ignore}
build_unflags =
  -Os
build_flags =
  ${env.build_flags}
  -O3
  -DJOYBUS_DISABLE_GBA_LINK
  -DENABLE_RUNTIME_SERIAL_DEBUG_CDC
  -DENABLE_EXPERIMENTAL_XINPUT2P_OUTPUT
  -DXINPUT_MULTI_SHARED_SECURITY_INTERFACE=0

; Release repo policy:
; keep only build environments that are enabled release targets. Diagnostic,
; bring-up, alternate-board, and future product environments stay in Adapt-Dev
; until they are promoted through tools/release_targets.json and CI.
