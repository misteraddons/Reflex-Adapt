name: Adapt Firmware Build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: adapt-firmware-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }} firmware
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REFLEX_ADAPT_LEGACY_REPO: ${{ github.workspace }}/_deps/Reflex-Adapt-Legacy
    strategy:
      fail-fast: false
      matrix:
        target:
          - classic2usb
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Check out Adapt Legacy map sources
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: misteraddons/Reflex-Adapt-Legacy
          path: _deps/Reflex-Adapt-Legacy
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/requirements-release.txt
      - name: Cache PlatformIO packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'tools/requirements-release.txt') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install build and test dependencies
        run: python -m pip install --requirement tools/requirements-release.txt
      - name: Run release source guards
        run: python tools/run_release_checks.py
      - name: Build target
        run: python tools/package_release.py --target ${{ matrix.target }} --build-only
      - name: Upload firmware build outputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: success()
        with:
          name: ${{ matrix.target }}-build
          path: |
            .pio/build/*/firmware.uf2
            dist/*.uf2
          if-no-files-found: error
