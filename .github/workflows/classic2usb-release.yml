name: Adapt Release Package

on:
  workflow_dispatch:
    inputs:
      require_tag_match:
        description: Require HEAD tag to match FIRMWARE_VERSION_STRING
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: adapt-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Build ${{ matrix.target }} release package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REQUIRE_TAG_MATCH: ${{ inputs.require_tag_match == true }}
      REFLEX_ADAPT_LEGACY_REPO: ${{ github.workspace }}/_deps/Reflex-Adapt-Legacy
    strategy:
      fail-fast: false
      matrix:
        target:
          - classic2usb
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
      - name: Check out Adapt Legacy map sources
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          repository: misteraddons/Reflex-Adapt-Legacy
          path: _deps/Reflex-Adapt-Legacy
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/requirements-release.txt
      - name: Cache PlatformIO packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'tools/requirements-release.txt') }}
          restore-keys: |
            ${{ runner.os }}-pio-
      - name: Install build and test dependencies
        run: python -m pip install --requirement tools/requirements-release.txt
      - name: Install release document tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc poppler-utils
          google-chrome --version || chromium --version || chromium-browser --version
      - name: Run release source guards
        run: python tools/run_release_checks.py
      - name: Package target
        shell: bash
        run: |
          args=()
          if [[ "${REQUIRE_TAG_MATCH}" == "true" ]]; then
            args+=(--require-tag-match)
          fi
          python tools/package_release.py --target "${{ matrix.target }}" "${args[@]}"
      - name: Create package archive
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          cd dist
          zip -r "${{ matrix.target }}_package_${GITHUB_REF_NAME}.zip" "${{ matrix.target }}_package"
      - name: Upload release package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.target }}-release-package
          path: |
            dist/${{ matrix.target }}_package
            dist/${{ matrix.target }}_package_*.zip
          if-no-files-found: error

  publish:
    name: Publish ${{ matrix.target }} tag release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - classic2usb
    steps:
      - name: Download validated release package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ matrix.target }}-release-package
          path: dist
      - name: Publish tag release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: dist/${{ matrix.target }}_package/release.md
          files: |
            dist/${{ matrix.target }}_package/ReflexClassic2USB_*.uf2
            dist/${{ matrix.target }}_package/adapt-manager-release.json
            dist/${{ matrix.target }}_package_*.zip
          fail_on_unmatched_files: true
